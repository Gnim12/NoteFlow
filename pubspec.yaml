name: noteflow
description: "Application moderne de prise de notes développée avec Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Icônes iOS
  cupertino_icons: ^1.0.8

  # Base de données locale SQLite
  sqflite: ^2.4.2

  # Gestion des chemins de fichiers
  path: ^1.9.1

  # Formatage des dates
  intl: ^0.20.2

  # Polices Google
  google_fonts: ^6.3.0

  lottie: ^3.3.2

  flutter_svg: ^2.2.0

  diacritic: ^0.1.6

  shared_preferences: ^2.5.3

  provider: ^6.1.5
  
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"

  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

  min_sdk_android: 21

flutter_native_splash:
  color: "#2563EB"
  image: "assets/icons/logo.png"

  android: true
  ios: false

  fullscreen: true

  android_12:
    color: "#2563EB"
    image: "assets/icons/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/backgrounds/

